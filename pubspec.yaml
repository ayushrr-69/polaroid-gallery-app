name: polaroid_gallery_app
description: "A premium high-fidelity gallery and curation experience."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  provider: ^6.1.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  shared_preferences: ^2.5.4
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.5
  http: ^1.2.0
  flutter_image_compress: ^2.3.0
  palette_generator: ^0.3.3+7
  flutter_colorpicker: ^1.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
